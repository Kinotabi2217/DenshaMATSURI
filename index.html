<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芝電電車まつりダイヤ Webビューア</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .view-panel { display: none; }
    .view-panel.active { display: block; }
    .table-container { overflow-x: auto; height: calc(100vh - 250px); border: 1px solid #e2e8f0; border-radius: 0.5rem; background-color: #fff; }
    table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 0.875rem; }
    th { background: #e2e8f0; padding: 8px var(--col-padding, 8px); border-bottom: 2px solid #cbd5e1; white-space: nowrap; position: sticky; top: 0; z-index: 10; color: #334155; font-weight: 600; text-align: center; }
    .data-row td { padding: var(--row-padding, 6px) var(--col-padding, 8px); border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle; transition: background-color 0.1s; white-space: nowrap; }
    tr:nth-child(even) { background-color: #fafafa; }
    .data-row:hover { background-color: #f0fdf4; }
    .row-checked td { opacity: 0.5; background-color: #f1f5f9 !important; text-decoration: line-through; }
    input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; accent-color: #2563eb; }
    
    /* ダイヤグラム用 */
    .diagram-container { overflow: hidden; height: calc(100vh - 300px); border: 1px solid #e2e8f0; border-radius: 0.5rem; background-color: #fff; position: relative; }
    #diagram-canvas { cursor: grab; display: block; width: 100%; height: 100%; }
    #diagram-canvas:active { cursor: grabbing; }
</style>
</head>
<body class="bg-slate-100 p-2 md:p-4 text-slate-800">
<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3 bg-white p-4 rounded-lg shadow-sm border border-slate-200">
        <h1 class="text-xl md:text-2xl font-extrabold text-blue-700 tracking-tight">芝電電車まつりダイヤ Webビューア</h1>
        <div class="flex items-center gap-3 flex-wrap">
            <div class="flex items-center gap-1 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200">
                <span class="text-sm font-medium text-slate-600 mr-1">行間</span>
                <button id="row-pad-dec" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">◁</button>
                <span id="row-pad-val" class="w-6 text-center font-mono text-sm">6</span>
                <button id="row-pad-inc" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">▷</button>
            </div>
            <div class="flex items-center gap-1 bg-slate-50 px-3 py-1.5 rounded-md border border-slate-200">
                <span class="text-sm font-medium text-slate-600 mr-1">列間</span>
                <button id="col-pad-dec" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">◁</button>
                <span id="col-pad-val" class="w-6 text-center font-mono text-sm">8</span>
                <button id="col-pad-inc" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-600 select-none">▷</button>
            </div>
            <label class="bg-slate-600 text-white px-4 py-2 rounded-md cursor-pointer hover:bg-slate-700 transition font-medium shadow-sm active:scale-95 flex-shrink-0 text-sm" title="別のダイヤファイルを読み込む場合">
                別ファイルを開く
                <input id="fileInput" type="file" class="hidden" accept=".oud2,.oud" />
            </label>
        </div>
    </div>

    <div id="results" class="hidden">
        
        <!-- タブ切り替え -->
        <div class="flex border-b border-slate-300 mb-4 bg-white px-2 pt-2 rounded-t-lg shadow-sm">
            <button id="tab-timetable" class="px-4 py-2 border-b-2 border-blue-600 text-blue-600 font-bold outline-none transition-colors select-none">時刻表</button>
            <button id="tab-diagram" class="px-4 py-2 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium outline-none transition-colors select-none">ダイヤグラム</button>
        </div>

        <div id="view-timetable">
            <div class="mb-4 flex flex-wrap gap-4 items-center">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 inline-block">
                    <select id="station-select" class="bg-slate-50 border border-slate-300 rounded-md px-3 py-2 text-base font-medium text-slate-700 shadow-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 cursor-pointer min-w-[200px]">
                    </select>
                </div>
                <div class="bg-slate-800 text-white px-5 py-2 rounded-lg shadow-sm border border-slate-700 flex items-center justify-center">
                    <span class="text-sm font-medium text-slate-300 mr-3">現在時刻</span>
                    <span id="current-time" class="text-2xl font-mono font-bold tracking-widest text-emerald-400">--:--:--</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                <!-- 上り -->
                <div class="flex flex-col">
                    <div class="bg-orange-500 text-white px-4 py-2 rounded-t-lg font-bold shadow-sm flex justify-between items-center">
                        <span id="nobori-title">上り</span>
                        <span id="nobori-count" class="text-xs bg-orange-700 px-2 py-0.5 rounded-full">0本</span>
                    </div>
                    <div class="table-container shadow-sm rounded-b-lg rounded-t-none">
                        <table>
                            <thead>
                                <tr>
                                    <th>確</th>
                                    <th>時刻</th>
                                    <th>列番</th>
                                    <th>種別</th>
                                    <th>行先</th>
                                    <th>番線</th>
                                </tr>
                            </thead>
                            <tbody id="nobori-body"></tbody>
                        </table>
                    </div>
                </div>
                <!-- 下り -->
                <div class="flex flex-col">
                    <div class="bg-blue-600 text-white px-4 py-2 rounded-t-lg font-bold shadow-sm flex justify-between items-center">
                        <span id="kudari-title">下り</span>
                        <span id="kudari-count" class="text-xs bg-blue-800 px-2 py-0.5 rounded-full">0本</span>
                    </div>
                    <div class="table-container shadow-sm rounded-b-lg rounded-t-none">
                        <table>
                            <thead>
                                <tr>
                                    <th>確</th>
                                    <th>時刻</th>
                                    <th>列番</th>
                                    <th>種別</th>
                                    <th>行先</th>
                                    <th>番線</th>
                                </tr>
                            </thead>
                            <tbody id="kudari-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-diagram" class="hidden">
            <div class="flex flex-wrap items-center gap-4 mb-2 bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200">
                <div class="text-sm font-bold text-slate-700">ダイヤグラム操作</div>
                <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200">
                    <span class="text-xs font-medium text-slate-500 mr-2">時間軸 (横)</span>
                    <button id="diag-x-dec" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-700 text-xs font-bold">縮小</button>
                    <button id="diag-x-inc" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-700 text-xs font-bold">拡大</button>
                </div>
                <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded border border-slate-200">
                    <span class="text-xs font-medium text-slate-500 mr-2">駅間 (縦)</span>
                    <button id="diag-y-dec" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-700 text-xs font-bold">縮小</button>
                    <button id="diag-y-inc" class="px-2 py-0.5 bg-white border border-slate-300 rounded hover:bg-slate-100 active:bg-slate-200 text-slate-700 text-xs font-bold">拡大</button>
                </div>
                <button id="diag-reset" class="px-3 py-1 bg-slate-700 border border-slate-800 rounded hover:bg-slate-600 active:bg-slate-800 text-white text-xs font-medium ml-auto">初期位置に戻す</button>
            </div>
            <div class="diagram-container shadow-sm" id="diagram-container">
                <canvas id="diagram-canvas"></canvas>
            </div>
        </div>
    </div>
</div>

function formatTime(timeStr) {
    if (!timeStr) return '';
    
    let targetStr = timeStr;
    if (timeStr.includes('/')) {
        const parts = timeStr.split('/');
        targetStr = parts[1] || parts[0];
    }
    
    if (targetStr.includes(':')) return targetStr;
    
    if (!/^\d+$/.test(targetStr)) return targetStr;
    
    let h = '00', m = '00', s = '00';
    if (targetStr.length === 3) {
        h = '0' + targetStr.slice(0, 1);
        m = targetStr.slice(1);
    } else if (targetStr.length === 4) {
        h = targetStr.slice(0, 2);
        m = targetStr.slice(2);
    } else if (targetStr.length === 5) {
        h = '0' + targetStr.slice(0, 1);
        m = targetStr.slice(1, 3);
        s = targetStr.slice(3);
    } else if (targetStr.length === 6) {
        h = targetStr.slice(0, 2);
        m = targetStr.slice(2, 4);
        s = targetStr.slice(4);
    } else {
        return targetStr;
    }
    
    return s === '00' ? `${h}:${m}` : `${h}:${m}:${s}`;
}

function parseTimeToMinutes(timeStr) {
    if (!timeStr) return null;
    const str = timeStr.replace(/:/g, '');
    let h=0, m=0, s=0;
    if (str.length === 3) { h = parseInt(str.slice(0,1), 10); m = parseInt(str.slice(1,3), 10); }
    else if (str.length === 4) { h = parseInt(str.slice(0,2), 10); m = parseInt(str.slice(2,4), 10); }
    else if (str.length === 5) { h = parseInt(str.slice(0,1), 10); m = parseInt(str.slice(1,3), 10); s = parseInt(str.slice(3,5), 10); }
    else if (str.length === 6) { h = parseInt(str.slice(0,2), 10); m = parseInt(str.slice(2,4), 10); s = parseInt(str.slice(4,6), 10); }
    else { return null; }
    
    if (h < 3) h += 24; 
    return h * 60 + m + s / 60;
}

function parseOuDia(text) {
    const lines = text.split(/\r?\n/);
    let stations = [], trains = [], syubetsuList = [];
    let curEki = null, curTrack = null, curT = null, curS = null;
    let currentDirection = 'Kudari';
    let blockStack = [];
    
    let kudariAlias = '';
    let noboriAlias = '';
    
    for(let line of lines) {
        if(line.startsWith('KudariDiaAlias=')) { kudariAlias = line.split('=')[1]; continue; }
        if(line.startsWith('NoboriDiaAlias=')) { noboriAlias = line.split('=')[1]; continue; }

        if(line === 'EkiTrack2Cont.') continue;
        if(line === 'Eki.') { 
            blockStack.push('Eki'); 
            curEki = { name: '', tracks: [], downMain: 0, upMain: 0 }; 
            stations.push(curEki); 
            continue; 
        }
        if(line === 'EkiTrack2.') { 
            blockStack.push('EkiTrack2'); 
            curTrack = { name: '', ryakusyou: '' }; 
            curEki.tracks.push(curTrack); 
            continue; 
        }
        if(line === 'Ressyasyubetsu.') { 
            blockStack.push('Syubetsu'); 
            curS = { name: '', color: '#000000' }; 
            syubetsuList.push(curS); 
            continue; 
        }
        if(line === 'Kudari.') { currentDirection = 'Kudari'; continue; }
        if(line === 'Nobori.') { currentDirection = 'Nobori'; continue; }
        
        if(line === 'Ressya.') { 
            blockStack.push('Ressya'); 
            curT = { sdMap: {}, number: '-', yukisaki: '', houkou: currentDirection, syubetsuIdx: 0 }; 
            trains.push(curT);
            continue; 
        }
        if(line === '.') { 
            blockStack.pop(); 
            continue; 
        }

        const block = blockStack.length > 0 ? blockStack[blockStack.length - 1] : "";

        if(block === 'Eki') {
            if(line.startsWith('Ekimei=')) curEki.name = line.split('=')[1];
            else if(line.startsWith('DownMain=')) curEki.downMain = parseInt(line.split('=')[1], 10) || 0;
            else if(line.startsWith('UpMain=')) curEki.upMain = parseInt(line.split('=')[1], 10) || 0;
        }
        else if(block === 'EkiTrack2') {
            if(line.startsWith('TrackName=')) curTrack.name = line.split('=')[1];
            else if(line.startsWith('TrackRyakusyou=')) curTrack.ryakusyou = line.split('=')[1];
        }
        else if(block === 'Syubetsu') {
            if(line.startsWith('Syubetsumei=')) {
                curS.name = line.split('=')[1];
            }
            else if(line.startsWith('JikokuhyouMojiColor=')) {
                let c = line.split('=')[1];
                if(c.length >= 8) {
                    let bb = c.slice(2, 4);
                    let gg = c.slice(4, 6);
                    let rr = c.slice(6, 8);
                    curS.color = `#${rr}${gg}${bb}`;
                }
            }
        }
        else if(block === 'Ressya') {
            if(line.startsWith('Syubetsu=')) curT.syubetsuIdx = parseInt(line.split('=')[1], 10);
            else if(line.startsWith('Ressyabangou=')) curT.number = line.split('=')[1];
            else if(line.startsWith('Yukisaki=')) curT.yukisaki = line.split('=')[1];
            else if(line.startsWith('Houkou=')) curT.houkou = line.split('=')[1];
            else if(line.startsWith('EkiJikoku=')) {
                const jikokus = line.split('=')[1].split(',');
                jikokus.forEach((d, i) => {
                    if(d && d.includes(';')) {
                        const parts = d.split(';');
                        const timeData = parts[1];
                        if (timeData) {
                            const timeStr = timeData.split('$')[0];
                            const trackIdx = timeData.split('$')[1] || '';
                            const formattedTime = formatTime(timeStr);
                            if (formattedTime) {
                                const stationIdx = (curT.houkou === 'Nobori') ? (stations.length - 1 - i) : i;
                                curT.sdMap[stationIdx] = { hatsu: formattedTime, rawTime: timeStr, trackIdx: trackIdx };
                            }
                        }
                    }
                });
            }
        }
    }

    trains.forEach(t => {
        let terminalName = '';
        if (t.yukisaki !== '') {
            const termIdx = parseInt(t.yukisaki, 10);
            if (!isNaN(termIdx) && stations[termIdx]) {
                terminalName = stations[termIdx].name;
            } else {
                terminalName = t.yukisaki; 
            }
        }
        
        if (!terminalName) {
            const indices = Object.keys(t.sdMap).map(Number).sort((a, b) => a - b);
            if (indices.length > 0) {
                const targetIdx = (t.houkou === 'Nobori') ? indices[0] : indices[indices.length - 1];
                if (stations[targetIdx]) {
                    terminalName = stations[targetIdx].name;
                }
            }
        }
        t.terminal = terminalName || '不明';
    });

    return { stations, trains, syubetsuList, kudariAlias, noboriAlias };
}

function renderTable(direction, bodyId, countId) {
    const idx = parseInt(document.getElementById('station-select').value);
    const body = document.getElementById(bodyId);
    body.innerHTML = '';
    const events = [];
    
    data.trains.forEach(t => {
        if(t.houkou !== direction) return;
        const sd = t.sdMap[idx];
        if(!sd) return;
        
        let trackName = '-';
        const st = data.stations[idx];
        if (st && sd.trackIdx !== '') {
            const trackCode = parseInt(sd.trackIdx, 10);
            if (!isNaN(trackCode) && st.tracks && st.tracks[trackCode]) {
                trackName = st.tracks[trackCode].ryakusyou || st.tracks[trackCode].name;
            } else {
                trackName = sd.trackIdx;
            }
        }
        
        const syubetsu = data.syubetsuList[t.syubetsuIdx] || { name: '普通', color: '#000000' };
        events.push({ 
            time: sd.hatsu, 
            number: t.number, 
            syubetsuName: syubetsu.name, 
            syubetsuColor: syubetsu.color, 
            terminal: t.terminal, 
            track: trackName 
        });
    });
    
    const sortedEvents = events.filter(e => e.time).sort((a, b) => {
        const padTime = (t) => {
            const p = t.split(':');
            if (p.length === 2) return parseInt(p[0] + p[1] + '00', 10);
            if (p.length === 3) return parseInt(p[0] + p[1] + p[2], 10);
            return parseInt(t.replace(/:/g, ''), 10);
        };
        return padTime(a.time) - padTime(b.time);
    });

    document.getElementById(countId).textContent = sortedEvents.length + '本';

    sortedEvents.forEach(ev => {
        const tr = document.createElement('tr');
        tr.className = 'data-row cursor-pointer select-none';
        tr.onclick = function(e) {
            if (e.target.tagName.toLowerCase() !== 'input') {
                const cb = this.querySelector('input[type="checkbox"]');
                cb.checked = !cb.checked;
                this.classList.toggle('row-checked', cb.checked);
            }
        };
        tr.innerHTML = `<td><input type="checkbox" onchange="this.closest('tr').classList.toggle('row-checked', this.checked)"></td>
                        <td class="font-bold text-slate-800 text-base">${ev.time}</td>
                        <td class="text-slate-500 font-medium">${ev.number}</td>
                        <td class="font-bold text-xs" style="color: ${ev.syubetsuColor};">${ev.syubetsuName}</td>
                        <td class="text-slate-700 font-bold">${ev.terminal}</td>
                        <td class="text-slate-500 font-bold">${ev.track || '-'}</td>`;
        body.appendChild(tr);
    });
}

// ダイヤの拡大縮小ボタン設定
function zoomDiag(axis, factor) {
    const canvas = document.getElementById('diagram-canvas');
    const rect = canvas.getBoundingClientRect();
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    if (axis === 'x' || axis === 'both') {
        let nextScaleX = diagScaleX * factor;
        nextScaleX = Math.max(0.1, Math.min(nextScaleX, 10.0));
        let actualFactorX = nextScaleX / diagScaleX;
        diagOffsetX = centerX - (centerX - diagOffsetX) * actualFactorX;
        diagScaleX = nextScaleX;
    }
    if (axis === 'y' || axis === 'both') {
        let nextScaleY = diagScaleY * factor;
        nextScaleY = Math.max(0.1, Math.min(nextScaleY, 10.0));
        let actualFactorY = nextScaleY / diagScaleY;
        diagOffsetY = centerY - (centerY - diagOffsetY) * actualFactorY;
        diagScaleY = nextScaleY;
    }
    renderDiagram();
}

document.getElementById('diag-x-dec').onclick = () => zoomDiag('x', 0.8);
document.getElementById('diag-x-inc').onclick = () => zoomDiag('x', 1.25);
document.getElementById('diag-y-dec').onclick = () => zoomDiag('y', 0.8);

document.getElementById('diag-reset').onclick = () => {
    diagScaleX = 1.0;
    diagScaleY = 1.0;
    diagOffsetX = 0;
    diagOffsetY = 0;
    renderDiagram();
};

function getTrainPoints(train) {
    const points = [];
    for (let i = 0; i < data.stations.length; i++) {
        const sd = train.sdMap[i];
        if (sd && sd.rawTime) {
            let chaku = null, hatsu = null;
            if (sd.rawTime.includes('/')) {
                const parts = sd.rawTime.split('/');
                if (parts[0]) chaku = parseTimeToMinutes(parts[0]);
                if (parts[1]) hatsu = parseTimeToMinutes(parts[1]);
            } else {
                hatsu = parseTimeToMinutes(sd.rawTime);
                chaku = hatsu; 
            }
            points.push({ stationIdx: i, chaku: chaku, hatsu: hatsu });
        }
    }
    return points.sort((a, b) => a.stationIdx - b.stationIdx);
}

function renderDiagram() {
    if (!data || !data.trains || data.trains.length === 0) return;
    
    const container = document.getElementById('diagram-container');
    const canvas = document.getElementById('diagram-canvas');
    const ctx = canvas.getContext('2d');
    
    let minTime = Number.MAX_VALUE;
    let maxTime = Number.MIN_VALUE;
    
    const allTrainPoints = data.trains.map(t => {
        const pts = getTrainPoints(t);
        pts.forEach(p => {
            if (p.chaku !== null) { minTime = Math.min(minTime, p.chaku); maxTime = Math.max(maxTime, p.chaku); }
            if (p.hatsu !== null) { minTime = Math.min(minTime, p.hatsu); maxTime = Math.max(maxTime, p.hatsu); }
        });
        return { train: t, points: pts };
    });
    
    if (minTime === Number.MAX_VALUE) return;
    
    const startHour = Math.floor(minTime / 60);
    const endHour = Math.ceil(maxTime / 60);
    const totalMinutes = (endHour - startHour) * 60;
    
    // 論理スケールに合わせた描画座標の係数
    const pxPerMinute = 8 * diagScaleX; 
    const stationHeight = 80 * diagScaleY; 
    
    const paddingLeft = 80;
    const paddingRight = 40;
    const paddingTop = 40;
    const paddingBottom = 40;
    
    const diagWidth = paddingLeft + totalMinutes * pxPerMinute + paddingRight;
    const diagHeight = paddingTop + (data.stations.length - 1) * stationHeight + paddingBottom;
    
    const rect = container.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, rect.width, rect.height);
    
    if (diagNeedsInit) {
        diagScaleX = 1.0;
        diagScaleY = 1.0;
        diagOffsetX = 0;
        diagOffsetY = 0;
        diagNeedsInit = false;
    }

    ctx.save();
    ctx.translate(diagOffsetX, diagOffsetY);
    
    // --- 罫線の描画 ---
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    
    // 描画最適化のためのカリング範囲
    const viewLeft = -diagOffsetX;
    const viewRight = -diagOffsetX + rect.width;
    const viewTop = -diagOffsetY;
    const viewBottom = -diagOffsetY + rect.height;
    
    for (let m = 0; m <= totalMinutes; m++) {
        const x = paddingLeft + m * pxPerMinute;
        
        if (x < viewLeft - 50 || x > viewRight + 50) continue;
        
        if (m % 60 === 0) {
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 1;
            const h = (startHour + m / 60) % 24;
            ctx.fillStyle = '#334155';
            ctx.font = "bold 13px sans-serif";
            
            ctx.fillText(`${h}:00`, x, paddingTop - 10);
            ctx.fillText(`${h}:00`, x, diagHeight - paddingBottom + 25); 
        } else if (m % 10 === 0) {
            ctx.strokeStyle = '#cbd5e1'; 
            ctx.lineWidth = 1;
        } else if (m % 2 === 0) {
            ctx.strokeStyle = '#e2e8f0'; 
            ctx.lineWidth = 0.5;
        } else {
            continue;
        }
        
        ctx.beginPath();
        ctx.moveTo(x, paddingTop);
        ctx.lineTo(x, diagHeight - paddingBottom);
        ctx.stroke();
    }
    
    // 横線（駅）
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = '#1e293b';
    ctx.font = "bold 13px sans-serif";
    
    for (let i = 0; i < data.stations.length; i++) {
        const y = paddingTop + i * stationHeight;
        
        if (y < viewTop - 50 || y > viewBottom + 50) continue;
        
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(paddingLeft, y);
        ctx.lineTo(diagWidth - paddingRight, y);
        ctx.stroke();
        
        ctx.fillText(data.stations[i].name, paddingLeft - 10, y);
    }
    
    // --- 列車の線の描画 ---
    allTrainPoints.forEach(tp => {
        const t = tp.train;
        const pts = tp.points;
        if (pts.length < 2) return;
        
        const syubetsu = data.syubetsuList[t.syubetsuIdx];
        ctx.strokeStyle = syubetsu ? syubetsu.color : '#000000';
        ctx.lineWidth = 2; // 線幅は固定で綺麗に表示
        
        ctx.beginPath();
        
        for (let i = 0; i < pts.length; i++) {
            const p = pts[i];
            const y = paddingTop + p.stationIdx * stationHeight;
            
            if (p.chaku !== null && p.hatsu !== null && p.chaku !== p.hatsu) {
                const xChaku = paddingLeft + (p.chaku - startHour * 60) * pxPerMinute;
                const xHatsu = paddingLeft + (p.hatsu - startHour * 60) * pxPerMinute;
                
                if (i === 0) {
                    ctx.moveTo(xHatsu, y);
                } else {
                    ctx.lineTo(xChaku, y);
                    ctx.lineTo(xHatsu, y);
                }
            } else {
                const tVal = p.hatsu !== null ? p.hatsu : p.chaku;
                const x = paddingLeft + (tVal - startHour * 60) * pxPerMinute;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
        }
        ctx.stroke();
        
        // 列番の描画
        if (pts.length > 0) {
            const p0 = pts[0]; 
            const pLast = pts[pts.length - 1]; 
            
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "bold 11px sans-serif"; // フォントサイズも固定
            
            const x0 = paddingLeft + ((p0.hatsu !== null ? p0.hatsu : p0.chaku) - startHour * 60) * pxPerMinute;
            const y0 = paddingTop + p0.stationIdx * stationHeight;
            
            // 画面外描画の最適化
            if (x0 > viewLeft - 50 && x0 < viewRight + 50 && y0 > viewTop - 50 && y0 < viewBottom + 50) {
                ctx.textAlign = "center";
                ctx.textBaseline = t.houkou === 'Kudari' ? "bottom" : "top";
                const offsetY0 = t.houkou === 'Kudari' ? -4 : 4;
                ctx.fillText(t.number, x0, y0 + offsetY0);
            }
            
            const xL = paddingLeft + ((pLast.chaku !== null ? pLast.chaku : pLast.hatsu) - startHour * 60) * pxPerMinute;
            const yL = paddingTop + pLast.stationIdx * stationHeight;
            
            if (xL > viewLeft - 50 && xL < viewRight + 50 && yL > viewTop - 50 && yL < viewBottom + 50) {
                ctx.textBaseline = t.houkou === 'Kudari' ? "top" : "bottom";
                const offsetYL = t.houkou === 'Kudari' ? 4 : -4;
                ctx.fillText(t.number, xL, yL + offsetYL);
            }
        }
    });
    
    ctx.restore();
}

// ズーム・パン(スクロール)機能のイベントリスナー
const dContainer = document.getElementById('diagram-container');
const dCanvas = document.getElementById('diagram-canvas');

dContainer.addEventListener('wheel', (e) => {
    if(document.getElementById('view-diagram').classList.contains('hidden')) return;
    e.preventDefault();
    
    const rect = dCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const zoomSensitivity = 0.001;
    // 拡大縮小の係数
    let factor = 1 - (e.deltaY * zoomSensitivity);
    factor = Math.max(0.8, Math.min(factor, 1.2));
    
    // スケールの制限
    if (diagScaleX * factor < 0.1) factor = 0.1 / diagScaleX;
    if (diagScaleX * factor > 10.0) factor = 10.0 / diagScaleX;
    if (diagScaleY * factor < 0.1) factor = 0.1 / diagScaleY;
    if (diagScaleY * factor > 10.0) factor = 10.0 / diagScaleY;

    // マウスカーソルの位置を中心にズームする計算
    diagOffsetX = mouseX - (mouseX - diagOffsetX) * factor;
    diagOffsetY = mouseY - (mouseY - diagOffsetY) * factor;
    
    diagScaleX *= factor;
    diagScaleY *= factor;
    
    renderDiagram();
}, { passive: false });

dContainer.addEventListener('mousedown', (e) => {
    if(document.getElementById('view-diagram').classList.contains('hidden')) return;
    isDiagDragging = true;
    diagDragStartX = e.clientX;
    diagDragStartY = e.clientY;
});

window.addEventListener('mousemove', (e) => {
    if (!isDiagDragging) return;
    const dx = e.clientX - diagDragStartX;
    const dy = e.clientY - diagDragStartY;
    diagOffsetX += dx;
    diagOffsetY += dy;
    diagDragStartX = e.clientX;
    diagDragStartY = e.clientY;
    renderDiagram();
});

window.addEventListener('mouseup', () => {
    isDiagDragging = false;
    
});
// --- ここから追加 ---
let isTouchDragging = false;
let lastTouchX = 0;
let lastTouchY = 0;

dCanvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isTouchDragging = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
    }
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    if (!isTouchDragging || e.touches.length !== 1) return;
    if (e.cancelable) e.preventDefault(); 
    const dx = e.touches[0].clientX - lastTouchX;
    const dy = e.touches[0].clientY - lastTouchY;
    diagOffsetX += dx;
    diagOffsetY += dy;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    renderDiagram();
}, { passive: false });

window.addEventListener('touchend', () => {
    isTouchDragging = false;
});
// --- ここまで追加 ---
window.addEventListener('resize', () => {
    if(!document.getElementById('view-diagram').classList.contains('hidden')) {
        renderDiagram();
    }
});

// 現在時刻の更新
function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const timeEl = document.getElementById('current-time');
    if (timeEl) {
        timeEl.textContent = `${h}:${m}:${s}`;
    }
}
setInterval(updateClock, 1000);
updateClock();

</script>
